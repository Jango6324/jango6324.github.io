<script>
  (function () {
    var footers = document.querySelectorAll('.zy-sidebar__footer');
    if (!footers.length) return;

    var desktopQuery = window.matchMedia('(max-width: 900px)');
    var bottomSafeGap = 10;

    function readNumber(node, attr, fallback) {
      var value = parseFloat(node.getAttribute(attr));
      return Number.isFinite(value) ? value : fallback;
    }

    function viewportHeight() {
      return (window.visualViewport && window.visualViewport.height) || window.innerHeight || document.documentElement.clientHeight;
    }

    footers.forEach(function (footer) {
      var root = footer.closest('.zy-sidebar__inner');
      var shell = footer.closest('.zy-shell');
      if (!root || !shell) return;

      var ticking = false;

      function updateFooterShift() {
        var shift = 0;

        if (!desktopQuery.matches) {
          var viewHeight = viewportHeight();
          var maxShift = readNumber(footer, 'data-scroll-shift-max', 650);
          var speed = readNumber(footer, 'data-scroll-shift-speed', 0.9);
          var scrollShift = Math.min(maxShift, Math.max(0, window.scrollY * speed));
          var rootRect = root.getBoundingClientRect();
          var footerTopBase = rootRect.top + footer.offsetTop;
          var footerBottomBase = footerTopBase + footer.offsetHeight;

          var viewportBottomShift = Math.max(0, viewHeight - bottomSafeGap - footerBottomBase);
          var shellRect = shell.getBoundingClientRect();
          var shellBoundMaxShift = Math.max(0, shellRect.bottom - bottomSafeGap - footerBottomBase);
          shift = Math.min(Math.max(scrollShift, viewportBottomShift), shellBoundMaxShift);
        }

        root.style.setProperty('--zy-footer-shift', shift.toFixed(1) + 'px');
        ticking = false;
      }

      function requestUpdate() {
        if (ticking) return;
        ticking = true;
        window.requestAnimationFrame(updateFooterShift);
      }

      updateFooterShift();
      window.addEventListener('scroll', requestUpdate, { passive: true });
      window.addEventListener('resize', requestUpdate);
      window.addEventListener('load', requestUpdate);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', requestUpdate);
        window.visualViewport.addEventListener('scroll', requestUpdate, { passive: true });
      }

      if (desktopQuery.addEventListener) {
        desktopQuery.addEventListener('change', requestUpdate);
      }

      if (window.ResizeObserver) {
        var resizeObserver = new ResizeObserver(requestUpdate);
        resizeObserver.observe(root);
        resizeObserver.observe(footer);
        resizeObserver.observe(shell);
      }
    });
  })();
</script>
